<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>漢字練習</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Shippori+Mincho:wght@700;800&display=swap" rel="stylesheet" />

    <link rel="icon" href="img/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- Header -->
    <header>
        <img src="img/logo.svg" alt="漢字練習 logo" class="header-logo-img" />
        <div class="header-titles">
            <h1 class="header-main">漢字練習</h1>
            <p class="header-sub">かんじ れんしゅう</p>
        </div>
    </header>

    <!-- Kanji Grid -->
    <main>
        <div id="search-bar">
            <span id="search-icon">🔍</span>
            <input id="search-input" type="search" placeholder="けんさく…" autocomplete="off" />
            <span id="search-count"></span>
        </div>
        <div id="kanji-grid"></div>
    </main>

    <!-- Animate Modal -->
    <div id="detail-panel">
        <div class="detail-box">
            <button class="detail-close" id="detail-close" aria-label="Close">✕</button>

            <div id="kjanidiv">
                <div id="stroke-order-container">
                    <div id="hanzi-target"></div>
                    <svg id="detail-stroke-numbers" xmlns="http://www.w3.org/2000/svg"></svg>
                    <canvas id="write-canvas"></canvas>
                </div>
                <div class="stroke-controls">
                    <button id="anim-play">▶</button>
                    <button id="anim-step">→</button>
                    <button id="anim-reset">↺</button>
                    <button id="anim-quiz">🗑️</button>
                </div>
                <div class="stroke-info" id="stroke-info">Loading…</div>
                <div class="stroke-step-row" id="stroke-step-row"></div>
            </div>

            <div class="detail-section">
                <h4>音読み</h4>
                <div class="reading-chips" id="detail-onyomi"></div>
            </div>

            <div class="detail-section">
                <div class="detail-section-row">
                    <h4>訓読み</h4>
                    <div id="detail-level-badge"></div>
                </div>
                <div class="reading-chips" id="detail-kunyomi"></div>
            </div>

            <div class="detail-section">
                <h4>例文</h4>
                <ul class="example-list" id="detail-examples"></ul>
            </div>

            <div class="detail-actions">
                <button id="detail-prev">◀ 前</button>
                <button id="detail-next">次 ▶</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <footer style="text-align:center;padding:10px;font-size:.65rem;color:#bbb;">
        Stroke data: <a href="https://kanjivg.tagaini.net/" target="_blank" rel="noopener" style="color:#bbb;">KanjiVG</a>
        &copy; Ulrich Apel,
        <a href="https://creativecommons.org/licenses/by-sa/3.0/" target="_blank" rel="noopener" style="color:#bbb;">CC BY-SA 3.0</a>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
