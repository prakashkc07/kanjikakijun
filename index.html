<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>漢字</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- Header -->
    <header>
        <span class="logo-kanji">漢</span>
        <h1>漢字</h1>
    </header>

    <!-- Kanji Grid -->
    <main>
        <div id="kanji-grid"></div>
    </main>

    <!-- Animate Modal -->
    <div id="detail-panel">
        <div class="detail-box">
            <button class="detail-close" id="detail-close" aria-label="Close">✕</button>

            <div id="kjanidiv">
                <div id="stroke-order-container">
                    <div id="hanzi-target"></div>
                    <svg id="detail-stroke-numbers" xmlns="http://www.w3.org/2000/svg"></svg>
                </div>
                <div class="stroke-controls">
                    <button id="anim-play">▶</button>
                    <button id="anim-step">→</button>
                    <button id="anim-reset">↺</button>
                    <button id="anim-quiz">✍️</button>
                </div>
                <div class="stroke-info" id="stroke-info">Loading…</div>
                <div class="stroke-step-row" id="stroke-step-row"></div>
            </div>

            <div class="detail-section">
                <h4>音読み</h4>
                <div class="reading-chips" id="detail-onyomi"></div>
            </div>

            <div class="detail-section">
                <div class="detail-section-row">
                    <h4>訓読み</h4>
                    <div id="detail-level-badge"></div>
                </div>
                <div class="reading-chips" id="detail-kunyomi"></div>
            </div>

            <div class="detail-section">
                <h4>例文</h4>
                <ul class="example-list" id="detail-examples"></ul>
            </div>

            <div class="detail-actions">
                <button id="detail-prev">←</button>
                <button id="detail-next">→</button>
            </div>
        </div>
    </div>

    <!-- Write Panel -->
    <div id="write-panel">
        <button class="write-btn-close" id="write-close" aria-label="Close">✕</button>
        <div class="write-header">
            <span class="write-kchar" id="write-kchar"></span>
        </div>
        <div class="write-canvas-wrap" id="write-canvas-wrap">
            <div id="write-hanzi-target"></div>
            <svg id="write-stroke-numbers" xmlns="http://www.w3.org/2000/svg"></svg>
            <canvas id="write-canvas"></canvas>
        </div>
        <div class="write-controls">
            <button class="write-ctrl-btn" id="write-prev">←</button>
            <button class="write-ctrl-btn write-clear-btn" id="write-clear">✕</button>
            <button class="write-ctrl-btn" id="write-next">→</button>
        </div>
    </div>

    <div id="toast"></div>

    <footer style="text-align:center;padding:10px;font-size:.65rem;color:#bbb;">
        Stroke data: <a href="https://kanjivg.tagaini.net/" target="_blank" rel="noopener" style="color:#bbb;">KanjiVG</a>
        &copy; Ulrich Apel,
        <a href="https://creativecommons.org/licenses/by-sa/3.0/" target="_blank" rel="noopener" style="color:#bbb;">CC BY-SA 3.0</a>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
